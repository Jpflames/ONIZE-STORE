<svg width="900" height="1125" viewBox="0 0 900 1125" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Founder portrait illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1125" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4FF"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="200" x2="780" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 460) rotate(90) scale(520 520)">
