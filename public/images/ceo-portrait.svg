    <path d="M294 512c20-109 86-177 156-177s136 68 156 177c-10 44-45 96-83 124-16 12-27 19-38 24-20 10-45 17-70 17s-50-7-70-17c-11-5-22-12-38-24-38-28-73-80-83-124Z" fill="#0B1220" fill-opacity="0.95"/>
    <path d="M340 405c36-42 86-68 141-68s105 26 141 68c-14 6-31 9-49 9-35 0-66-11-92-29-26 18-57 29-92 29-18 0-35-3-49-9Z" fill="#0B1220" fill-opacity="0.85"/>
