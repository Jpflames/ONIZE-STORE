    </radialGradient>
    <filter id="softShadow" x="-40" y="-40" width="980" height="1205" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="1125" rx="56" fill="url(#bg)"/>
  <path d="M164 249C264 141 414 96 544 121C675 146 761 248 808 368C857 493 847 661 760 788C672 917 508 1005 362 983C216 961 104 829 80 675C56 520 78 343 164 249Z" fill="url(#accent)"/>
  <circle cx="450" cy="460" r="520" fill="url(#glow)"/>

  <!-- Minimal, elegant silhouette (placeholder until a real photo is provided) -->
